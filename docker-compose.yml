# NexChat Docker Compose
# 一键启动：前端 + 后端 + 数据持久化
#
# 使用方式：
#   1. 复制 server/.env.example 为 server/.env，填入 API Key
#   2. docker-compose up --build

services:
  # 前端 (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # 后端 (FastAPI)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - nexchat_data:/app/data
    env_file:
      - ./server/.env
    restart: unless-stopped

volumes:
  nexchat_data:
