# NexChat 前端 Nginx 配置
#
# 关键点：
# 1. resolver 指向 Docker 内置 DNS（127.0.0.11），让 backend 主机名在运行时解析
#    避免 nginx 启动阶段因 backend 容器还未就绪而做静态解析失败导致 emerg 退出
# 2. proxy_pass 用变量形式，强制走 resolver（直接写 http://backend 会触发启动期解析）
# 3. SSE 流式必须关 proxy_buffering 并放长 read_timeout

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS；valid 控制缓存时间
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA 路由：所有未命中静态文件的请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理（使用变量触发运行时 DNS 解析）
    location /api/ {
        set $backend_upstream "http://backend:8000";
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE 流式必需配置
        proxy_set_header X-Accel-Buffering no;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
}
